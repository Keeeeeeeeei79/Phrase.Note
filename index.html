<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phrase.Note</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface-2: #232323;
    --border: #2a2a2a;
    --border-strong: #3a3a3a;
    --text: #ffffff;
    --text-sub: #a0a0a0;
    --text-mute: #6a6a6a;
    --accent: #ff6b35;
    --accent-hover: #ff8556;
    --accent-dim: rgba(255, 107, 53, 0.15);
    --danger: #e74c3c;
    --danger-dim: rgba(231, 76, 60, 0.15);
    --radius: 4px;
    --radius-lg: 6px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }
  header {
    padding: 32px 0 24px;
    border-bottom: 2px solid var(--text);
    margin-bottom: 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo-block {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .logo .dot { color: var(--accent); }
  .word-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding-bottom: 4px;
  }
  .word-count strong {
    color: var(--accent);
    font-size: 14px;
    margin: 0 2px;
  }
  .header-actions { display: flex; gap: 6px; }

  button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  button:hover {
    border-color: var(--text);
    background: var(--surface);
  }
  button.primary {
    background: var(--accent);
    color: #0e0e0e;
    border-color: var(--accent);
  }
  button.primary:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }
  button.danger-btn {
    background: transparent;
    color: var(--danger);
    border-color: transparent;
    padding: 6px 10px;
    font-size: 11px;
  }
  button.danger-btn:hover {
    background: var(--danger-dim);
    border-color: var(--danger);
  }
  button.copy-btn {
    background: transparent;
    color: var(--accent);
    border-color: transparent;
    padding: 6px 10px;
    font-size: 11px;
  }
  button.copy-btn:hover {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-mute);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .add-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 40px;
    position: relative;
  }
  .add-section::before {
    content: '';
    position: absolute;
    top: -1px;
    left: 24px;
    right: 24px;
    height: 2px;
    background: var(--accent);
  }
  .add-title {
    font-size: 18px;
    font-weight: 800;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  .add-subtitle {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 20px;
  }
  .step { margin-bottom: 16px; }
  .step-label {
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .step-label.optional::after {
    content: 'Optional';
    margin-left: 8px;
    font-size: 10px;
    color: var(--text-mute);
    padding: 2px 6px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  input[type="text"], textarea {
    width: 100%;
    font-family: inherit;
    font-size: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--bg);
    color: var(--text);
    resize: vertical;
    transition: all 0.15s;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-2);
  }
  textarea {
    min-height: 160px;
    line-height: 1.6;
  }
  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }

  /* List */
  .list-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .search-box {
    position: relative;
    flex: 1;
    max-width: 320px;
    min-width: 200px;
  }
  .search-box input {
    padding-left: 36px;
    font-size: 13px;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-mute);
    pointer-events: none;
    font-size: 14px;
  }

  /* Phrase cards */
  .phrase-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 10px;
    overflow: hidden;
    transition: all 0.15s;
    position: relative;
  }
  .phrase-card:hover { border-color: var(--border-strong); }
  .phrase-card.open { border-color: var(--accent); }
  .phrase-card.open::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .phrase-card-header {
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    gap: 16px;
  }
  .phrase-card-main { flex: 1; min-width: 0; }
  .phrase-card-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.4;
    word-break: break-word;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .chevron {
    color: var(--text-mute);
    transition: transform 0.2s;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .phrase-card.open .chevron {
    transform: rotate(180deg);
    color: var(--accent);
  }
  .phrase-card-detail {
    padding: 0 20px 20px;
    border-top: 1px solid var(--border);
    display: none;
    animation: slideDown 0.2s ease-out;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .phrase-card.open .phrase-card-detail { display: block; }
  .detail-content {
    margin-top: 16px;
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    word-break: break-word;
  }
  /* Markdown styles */
  .detail-content h1,
  .detail-content h2,
  .detail-content h3,
  .detail-content h4 {
    margin: 20px 0 8px;
    font-weight: 800;
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .detail-content h1 { font-size: 20px; }
  .detail-content h2 { font-size: 17px; color: var(--accent); }
  .detail-content h3 { font-size: 15px; }
  .detail-content h4 { font-size: 13px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.08em; }
  .detail-content p { margin: 8px 0; }
  .detail-content strong { font-weight: 700; color: var(--accent); }
  .detail-content em { font-style: italic; color: var(--text-sub); }
  .detail-content code {
    font-family: 'SF Mono', ui-monospace, Menlo, monospace;
    font-size: 12px;
    background: var(--bg);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .detail-content pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    overflow-x: auto;
    font-size: 12px;
    line-height: 1.5;
    margin: 10px 0;
  }
  .detail-content pre code {
    background: transparent;
    border: none;
    padding: 0;
  }
  .detail-content ul,
  .detail-content ol {
    padding-left: 22px;
    margin: 8px 0;
  }
  .detail-content li { margin: 4px 0; }
  .detail-content blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 14px;
    margin: 10px 0;
    color: var(--text-sub);
    font-style: italic;
  }
  .detail-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
  .detail-content a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .detail-meta {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .detail-actions {
    display: flex;
    gap: 4px;
  }
  .detail-date {
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.05em;
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-mute);
  }
  .empty-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 6px;
  }
  .empty-sub {
    font-size: 12px;
    color: var(--text-mute);
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 400px;
    width: 100%;
  }
  .modal h3 {
    margin: 0 0 8px;
    font-size: 16px;
    font-weight: 800;
  }
  .modal p {
    margin: 0 0 20px;
    font-size: 13px;
    color: var(--text-sub);
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-actions .delete-confirm {
    background: var(--danger);
    color: white;
    border-color: var(--danger);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (max-width: 520px) {
    .container { padding: 0 16px 60px; }
    header { padding: 24px 0 20px; margin-bottom: 24px; }
    .logo { font-size: 24px; }
    .add-section { padding: 18px; }
    .header-actions button { padding: 8px 10px; font-size: 10px; }
    .phrase-card-header { padding: 14px 16px; }
    .phrase-card-title { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-block">
      <div class="logo">Phrase<span class="dot">.</span>Note</div>
      <div class="word-count">Total <strong id="word-count">0</strong>phrases</div>
    </div>
    <div class="header-actions">
      <button onclick="exportData()">Export</button>
      <button onclick="document.getElementById('import-file').click()">Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    </div>
  </header>

  <section class="add-section">
    <h2 class="add-title">Add new phrase</h2>
    <p class="add-subtitle">AIで調べた解説をそのまま貼り付けて保存。マークダウンも綺麗に表示されます</p>

    <div class="step">
      <div class="step-label optional">Title</div>
      <input type="text" id="title-input" placeholder="例: as if の使い方 / 同意の表現まとめ" autocomplete="off">
    </div>

    <div class="step">
      <div class="step-label">Content</div>
      <textarea id="content-input" placeholder="AIで調べた内容をここにペースト..."></textarea>
    </div>

    <div class="form-actions">
      <button onclick="clearForm()">クリア</button>
      <button class="primary" onclick="savePhrase()">登録する</button>
    </div>
  </section>

  <div class="section-label">My phrases</div>

  <div class="list-toolbar">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="filter-input" placeholder="検索..." oninput="renderList()">
    </div>
  </div>

  <div id="phrase-list"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">削除しますか？</h3>
    <p id="modal-message"></p>
    <div class="modal-actions">
      <button onclick="closeModal()">キャンセル</button>
      <button class="delete-confirm" id="modal-confirm">削除する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const STORAGE_KEY = 'phrasenote_v1';
  let phrases = loadPhrases();

  function loadPhrases() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }
  function savePhrases() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(phrases));
  }
  function updateCount() {
    document.getElementById('word-count').textContent = phrases.length;
  }

  function getFirstLine(text) {
    if (!text) return '(no content)';
    const lines = text.split('\n');
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.length > 0) {
        return trimmed.replace(/^#+\s*/, '').replace(/^[*_]+|[*_]+$/g, '');
      }
    }
    return '(no content)';
  }

  function savePhrase() {
    const title = document.getElementById('title-input').value.trim();
    const content = document.getElementById('content-input').value.trim();
    if (!content) {
      showToast('内容を入力してください');
      document.getElementById('content-input').focus();
      return;
    }
    const now = Date.now();
    phrases.unshift({
      id: now + '_' + Math.random().toString(36).slice(2, 8),
      title,
      content,
      created_at: now
    });
    savePhrases();
    clearForm();
    renderList();
    updateCount();
    showToast('登録しました');
  }

  function clearForm() {
    document.getElementById('title-input').value = '';
    document.getElementById('content-input').value = '';
  }

  function renderList() {
    const filter = document.getElementById('filter-input').value.trim().toLowerCase();
    let filtered = phrases;
    if (filter) {
      filtered = filtered.filter(p =>
        (p.title || '').toLowerCase().includes(filter) ||
        p.content.toLowerCase().includes(filter)
      );
    }

    const list = document.getElementById('phrase-list');

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-title">${phrases.length === 0 ? 'No phrases yet' : 'No results'}</div>
          <div class="empty-sub">${phrases.length === 0 ? '上のフォームから最初のフレーズを追加してみよう' : '別の条件で検索してください'}</div>
        </div>
      `;
      return;
    }

    list.innerHTML = filtered.map(p => {
      const hasTitle = p.title && p.title.trim().length > 0;
      const displayTitle = hasTitle ? p.title : getFirstLine(p.content);
      const date = new Date(p.created_at);
      const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
      return `
        <div class="phrase-card" data-id="${p.id}">
          <div class="phrase-card-header" onclick="toggleCard('${p.id}')">
            <div class="phrase-card-main">
              <div class="phrase-card-title">${escapeHtml(displayTitle)}</div>
            </div>
            <span class="chevron">▼</span>
          </div>
          <div class="phrase-card-detail">
            <div class="detail-content">${renderMarkdown(p.content)}</div>
            <div class="detail-meta">
              <div class="detail-date">${dateStr}</div>
              <div class="detail-actions">
                <button class="copy-btn" onclick="copyPhrase('${p.id}', event)">コピー</button>
                <button class="danger-btn" onclick="confirmDelete('${p.id}', event)">削除</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleCard(id) {
    const card = document.querySelector(`.phrase-card[data-id="${id}"]`);
    if (card) card.classList.toggle('open');
  }

  function copyPhrase(id, event) {
    if (event) event.stopPropagation();
    const p = phrases.find(x => x.id === id);
    if (!p) return;
    navigator.clipboard.writeText(p.content).then(() => {
      showToast('コピーしました');
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = p.content;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('コピーしました');
    });
  }

  function confirmDelete(id, event) {
    if (event) event.stopPropagation();
    const p = phrases.find(x => x.id === id);
    if (!p) return;
    const hasTitle = p.title && p.title.trim().length > 0;
    const preview = (hasTitle ? p.title : getFirstLine(p.content)).slice(0, 30);
    document.getElementById('modal-title').textContent = '削除しますか？';
    document.getElementById('modal-message').textContent = `「${preview}${preview.length >= 30 ? '...' : ''}」を削除します。`;
    document.getElementById('modal').classList.add('show');
    document.getElementById('modal-confirm').onclick = () => {
      phrases = phrases.filter(x => x.id !== id);
      savePhrases();
      renderList();
      updateCount();
      closeModal();
      showToast('削除しました');
    };
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target.id === 'modal') closeModal();
  });

  function exportData() {
    if (phrases.length === 0) {
      showToast('エクスポートするフレーズがありません');
      return;
    }
    const blob = new Blob([JSON.stringify(phrases, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `phrasenote_${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('エクスポートしました');
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const imported = JSON.parse(e.target.result);
        if (!Array.isArray(imported)) throw new Error('配列形式ではありません');
        const existingIds = new Set(phrases.map(p => p.id));
        const newOnes = imported.filter(p => p && p.content && !existingIds.has(p.id));
        phrases = [...newOnes, ...phrases];
        savePhrases();
        renderList();
        updateCount();
        showToast(`${newOnes.length}件をインポートしました`);
      } catch (err) {
        showToast('インポート失敗: ' + err.message);
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // Minimal Markdown renderer
  function renderMarkdown(src) {
    if (!src) return '';
    let s = src;

    s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    s = s.replace(/```([\s\S]*?)```/g, (m, code) => {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');

    s = s.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    s = s.replace(/^---+$/gm, '<hr>');

    s = s.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

    s = s.replace(/\*\*\*([^*\n]+)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');

    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    s = s.replace(/(?:^\d+\.\s.+(?:\n|$))+/gm, (match) => {
      const items = match.trim().split('\n').map(line => {
        const m = line.match(/^\d+\.\s(.+)$/);
        return m ? '<li>' + m[1] + '</li>' : '';
      }).join('');
      return '<ol>' + items + '</ol>';
    });
    s = s.replace(/(?:^[-*]\s.+(?:\n|$))+/gm, (match) => {
      const items = match.trim().split('\n').map(line => {
        const m = line.match(/^[-*]\s(.+)$/);
        return m ? '<li>' + m[1] + '</li>' : '';
      }).join('');
      return '<ul>' + items + '</ul>';
    });

    const blocks = s.split(/\n\n+/);
    s = blocks.map(b => {
      const trimmed = b.trim();
      if (!trimmed) return '';
      if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(trimmed)) return trimmed;
      return '<p>' + trimmed.replace(/\n/g, '<br>') + '</p>';
    }).join('\n');

    return s;
  }

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), 2200);
  }

  renderList();
  updateCount();
</script>

</body>
